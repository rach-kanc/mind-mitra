

services:
  # MindMitra Backend API
  mindmitra-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=mindmitra
      - REDIS_URL=redis://redis:6379
      - DEBUG=true
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - mindmitra-network

  # MongoDB Database
  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=mindmitra
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    restart: unless-stopped
    networks:
      - mindmitra-network

  # Redis for caching and background tasks
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - mindmitra-network

  # Celery Worker for background tasks
  celery-worker:
    build: .
    command: celery -A app.core.celery worker --loglevel=info
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=mindmitra
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - mindmitra-network

  # Celery Beat for scheduled tasks
  celery-beat:
    build: .
    command: celery -A app.core.celery beat --loglevel=info
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=mindmitra
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - mindmitra-network

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - mindmitra-api
    restart: unless-stopped
    networks:
      - mindmitra-network

volumes:
  mongodb_data:
  redis_data:

networks:
  mindmitra-network:
    driver: bridge 